# Specify the debug interface. ST-LINK is standard for STM32.
# If using an older ST-LINK V2, this remains the same.
# If using a custom CMSIS-DAP debugger, change to: source [find interface/cmsis-dap.cfg]
source [find interface/stlink.cfg]

# Select the transport protocol. SWD is recommended for STM32.
transport select hla_swd

# Specify the target microcontroller family.
# The STM32H723ZGT6 is a single-core Cortex-M7, which falls under the generic H7 configuration.
source [find target/stm32h7x.cfg]

# Set the adapter speed in kHz.
# 2000 kHz is a safe default. The H7 can often support higher speeds (e.g., 4000 or 8000) depending on wire length.
adapter speed 8000

# Configure the reset signal behavior.
# srst_only: Use the hardware reset (NRST) pin.
# srst_nogate: The reset line is not gated by the debug clock.
# connect_assert_srst: Connects to the target while holding it in reset (useful if the MCU is sleeping).
;reset_config srst_only srst_nogate connect_assert_srst
