<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Log Viewer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
    <h1>Flight Log Viewer</h1>
    <span class="tag">STM32H723</span>
    <span class="file-info" id="fileInfo"></span>
</div>

<div class="drop-zone" id="dropZone">
    <p><strong>Drop a .BIN log file here</strong> or click to select</p>
    <p class="formats">FlightData_t packed binary &middot; 0xCAFE sync</p>
</div>

<input type="file" id="fileInput" accept=".bin,.BIN">

<div class="stats hidden" id="stats"></div>
<div class="range-control hidden" id="rangeControl">
    <div class="range-label">
        <span>Sample range</span>
        <span id="rangeInfo">0 – 0</span>
    </div>
    <div class="range-track" id="rangeTrack">
        <div class="range-minimap"><canvas id="minimapCanvas"></canvas></div>
        <div class="range-selected" id="rangeSelected"></div>
        <div class="range-handle range-handle-left" id="handleLeft"></div>
        <div class="range-handle range-handle-right" id="handleRight"></div>
    </div>
</div>
<div class="charts hidden" id="charts"></div>

<script src="js/formats.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/analysis.js"></script>
<script src="js/charts.js"></script>
<script src="js/states.js"></script>
<script src="js/stats.js"></script>
<script src="js/range.js"></script>
<script src="js/main.js"></script>
</body>
</html>
