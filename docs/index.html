<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Log Viewer</title>
<style>
:root {
    --bg: #12141a;
    --surface: #1a1d25;
    --border: #2a2d38;
    --text: #e0e2e8;
    --text-dim: #7a7e8c;
    --accent: #e89030;
    --accent-dim: rgba(232, 144, 48, 0.15);
    --red: #e85454;
    --green: #4ecb71;
    --blue: #5b9cf6;
    --purple: #b07af5;
    --cyan: #4ec9c9;
    --yellow: #e8c840;
    --chart-grid: rgba(255,255,255,0.04);
    --chart-grid-strong: rgba(255,255,255,0.08);
    --handle: #e89030;
    --range-bg: rgba(232, 144, 48, 0.08);
    --range-active: rgba(232, 144, 48, 0.15);
}

@media (prefers-color-scheme: light) {
    :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --border: #dcdfe6;
        --text: #1a1d25;
        --text-dim: #6b7080;
        --accent: #d07820;
        --accent-dim: rgba(208, 120, 32, 0.1);
        --chart-grid: rgba(0,0,0,0.04);
        --chart-grid-strong: rgba(0,0,0,0.08);
        --handle: #d07820;
        --range-bg: rgba(208, 120, 32, 0.06);
        --range-active: rgba(208, 120, 32, 0.12);
    }
}

:root[data-theme="light"] {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --border: #dcdfe6;
    --text: #1a1d25;
    --text-dim: #6b7080;
    --accent: #d07820;
    --accent-dim: rgba(208, 120, 32, 0.1);
    --chart-grid: rgba(0,0,0,0.04);
    --chart-grid-strong: rgba(0,0,0,0.08);
    --handle: #d07820;
    --range-bg: rgba(208, 120, 32, 0.06);
    --range-active: rgba(208, 120, 32, 0.12);
}

:root[data-theme="dark"] {
    --bg: #12141a;
    --surface: #1a1d25;
    --border: #2a2d38;
    --text: #e0e2e8;
    --text-dim: #7a7e8c;
    --accent: #e89030;
    --accent-dim: rgba(232, 144, 48, 0.15);
    --chart-grid: rgba(255,255,255,0.04);
    --chart-grid-strong: rgba(255,255,255,0.08);
    --handle: #e89030;
    --range-bg: rgba(232, 144, 48, 0.08);
    --range-active: rgba(232, 144, 48, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
}

.header {
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
}

.header h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }

.header .tag {
    font-size: 0.7rem; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--accent);
    background: var(--accent-dim); padding: 0.2rem 0.5rem; border-radius: 3px;
}

.header .file-info {
    margin-left: auto; font-size: 0.8rem; color: var(--text-dim);
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}

.drop-zone {
    margin: 1.5rem 2rem; padding: 3rem 2rem;
    border: 2px dashed var(--border); border-radius: 8px;
    text-align: center; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: var(--accent-dim); }
.drop-zone p { color: var(--text-dim); font-size: 0.9rem; }
.drop-zone p strong { color: var(--text); }
.drop-zone .formats {
    margin-top: 0.5rem; font-size: 0.75rem; color: var(--text-dim);
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}

.stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0.75rem; margin: 0 2rem 1.5rem;
}
.stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.75rem 1rem;
}
.stat-card .label {
    font-size: 0.65rem; font-weight: 500; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.25rem;
}
.stat-card .value {
    font-size: 1.1rem; font-weight: 600;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-variant-numeric: tabular-nums;
}

.range-control {
    margin: 0 2rem 1rem; padding: 0.75rem 1rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
}
.range-control .range-label {
    font-size: 0.65rem; font-weight: 500; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.5rem;
    display: flex; justify-content: space-between;
}
.range-track {
    position: relative; height: 32px; background: var(--range-bg);
    border-radius: 4px; cursor: pointer; user-select: none;
}
.range-selected {
    position: absolute; top: 0; height: 100%;
    background: var(--range-active); border-radius: 2px;
}
.range-handle {
    position: absolute; top: -2px; width: 8px; height: 36px;
    background: var(--handle); border-radius: 3px; cursor: ew-resize;
    transition: transform 0.05s;
}
.range-handle:hover, .range-handle.active { transform: scaleX(1.4); }
.range-handle-left { border-top-right-radius: 0; border-bottom-right-radius: 0; }
.range-handle-right { border-top-left-radius: 0; border-bottom-left-radius: 0; }
.range-minimap {
    position: absolute; top: 4px; left: 0; right: 0; bottom: 4px;
    pointer-events: none;
}
.range-minimap canvas { width: 100%; height: 100%; display: block; }

.charts { padding: 0 2rem 2rem; display: flex; flex-direction: column; gap: 1rem; }
.chart-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 1rem; overflow-x: auto;
}
.chart-container .chart-title {
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.03em;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.75rem;
}
.chart-container .chart-title .legend { display: flex; gap: 0.75rem; font-weight: 400; font-size: 0.65rem; }
.chart-container .chart-title .legend span { display: flex; align-items: center; gap: 0.3rem; }
.chart-container .chart-title .legend span::before { content: ''; width: 10px; height: 2px; border-radius: 1px; }
.legend-x::before { background: var(--red) !important; }
.legend-y::before { background: var(--green) !important; }
.legend-z::before { background: var(--blue) !important; }
.chart-container canvas { width: 100%; height: 180px; display: block; }

input[type="file"] { display: none; }
.format-select { margin: 0 2rem 1rem; display: flex; gap: 0.5rem; align-items: center; }
.format-select label { font-size: 0.75rem; color: var(--text-dim); font-weight: 500; }
.format-select select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.8rem;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
.chart-tooltip {
    position: absolute; pointer-events: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.35rem 0.5rem;
    font-size: 0.7rem; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-variant-numeric: tabular-nums; color: var(--text);
    white-space: nowrap; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    transition: opacity 0.08s;
}
.chart-tooltip .tt-sample { color: var(--text-dim); margin-bottom: 0.15rem; }
.chart-tooltip .tt-row { display: flex; align-items: center; gap: 0.4rem; }
.chart-tooltip .tt-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.chart-container { position: relative; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="header">
    <h1>Flight Log Viewer</h1>
    <span class="tag">STM32H723</span>
    <span class="file-info" id="fileInfo"></span>
</div>

<div class="format-select">
    <label>Struct format:</label>
    <select id="formatSelect">
        <option value="v2">FlightData_t (current)</option>
        <option value="v1">SensorData_t (legacy)</option>
    </select>
</div>

<div class="drop-zone" id="dropZone">
    <p><strong>Drop a .BIN log file here</strong> or click to select</p>
    <p class="formats">FlightData_t packed binary &middot; 0xCAFE sync</p>
</div>

<input type="file" id="fileInput" accept=".bin,.BIN">

<div class="stats hidden" id="stats"></div>
<div class="range-control hidden" id="rangeControl">
    <div class="range-label">
        <span>Sample range</span>
        <span id="rangeInfo">0 – 0</span>
    </div>
    <div class="range-track" id="rangeTrack">
        <div class="range-minimap"><canvas id="minimapCanvas"></canvas></div>
        <div class="range-selected" id="rangeSelected"></div>
        <div class="range-handle range-handle-left" id="handleLeft"></div>
        <div class="range-handle range-handle-right" id="handleRight"></div>
    </div>
</div>
<div class="charts hidden" id="charts"></div>

<script>
const FORMATS = {
    v2: {
        parse(dv, offset) {
            let o = offset;
            const r = {};
            r.Sync = dv.getUint16(o, true); o += 2;
            r.AccelX = dv.getFloat32(o, true); o += 4;
            r.AccelY = dv.getFloat32(o, true); o += 4;
            r.AccelZ = dv.getFloat32(o, true); o += 4;
            r.GyroX = dv.getFloat32(o, true); o += 4;
            r.GyroY = dv.getFloat32(o, true); o += 4;
            r.GyroZ = dv.getFloat32(o, true); o += 4;
            r.MagX = dv.getFloat32(o, true); o += 4;
            r.MagY = dv.getFloat32(o, true); o += 4;
            r.MagZ = dv.getFloat32(o, true); o += 4;
            r.PressurePa = dv.getFloat32(o, true); o += 4;
            r.TemperatureC = dv.getFloat32(o, true); o += 4;
            r.Latitude = dv.getInt32(o, true); o += 4;
            r.Longitude = dv.getInt32(o, true); o += 4;
            r.Altitude = dv.getFloat32(o, true); o += 4;
            r.VelocityZ = dv.getFloat32(o, true); o += 4;
            r.Flags = dv.getUint32(o, true); o += 4;
            r.State = dv.getUint8(o); o += 1;
            return { record: r, size: o - offset };
        },
        recordSize: 67
    },
    v1: {
        parse(dv, offset) {
            let o = offset;
            const r = {};
            r.Sync = dv.getUint16(o, true); o += 2;
            r.TimestampMS = dv.getUint32(o, true); o += 4;
            r.AccelX = dv.getFloat32(o, true); o += 4;
            r.AccelY = dv.getFloat32(o, true); o += 4;
            r.AccelZ = dv.getFloat32(o, true); o += 4;
            r.GyroX = dv.getFloat32(o, true); o += 4;
            r.GyroY = dv.getFloat32(o, true); o += 4;
            r.GyroZ = dv.getFloat32(o, true); o += 4;
            r.MagX = dv.getFloat32(o, true); o += 4;
            r.MagY = dv.getFloat32(o, true); o += 4;
            r.MagZ = dv.getFloat32(o, true); o += 4;
            r.PressurePa = dv.getFloat32(o, true); o += 4;
            r.TemperatureC = dv.getFloat32(o, true); o += 4;
            r.Latitude = dv.getInt32(o, true); o += 4;
            r.Longitude = dv.getInt32(o, true); o += 4;
            r.Altitude = dv.getFloat32(o, true); o += 4;
            r.VelocityZ = dv.getFloat32(o, true); o += 4;
            return { record: r, size: o - offset };
        },
        recordSize: 66
    }
};

const SYNC = 0xCAFE;
let allRecords = [];
let viewStart = 0;
let viewEnd = 1;

function decode(buffer) {
    const fmt = FORMATS[document.getElementById('formatSelect').value];
    const dv = new DataView(buffer);
    const records = [];
    let pos = 0, skipped = 0;
    while (pos <= buffer.byteLength - fmt.recordSize) {
        if (dv.getUint16(pos, true) !== SYNC) { pos++; skipped++; continue; }
        const { record, size } = fmt.parse(dv, pos);
        records.push(record);
        pos += size;
    }
    return { records, skipped };
}

function getCol(records, key) { return records.map(r => r[key]); }

const chartMeta = new Map();

function drawChart(canvas, datasets) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const w = rect.width, h = rect.height;
    const pad = { top: 10, right: 12, bottom: 24, left: 60 };
    const plotW = w - pad.left - pad.right;
    const plotH = h - pad.top - pad.bottom;

    let allVals = [], maxLen = 0;
    for (const ds of datasets) { allVals = allVals.concat(ds.data); maxLen = Math.max(maxLen, ds.data.length); }

    let yMin = Math.min(...allVals), yMax = Math.max(...allVals);
    if (yMin === yMax) { yMin -= 1; yMax += 1; }
    const yPad = (yMax - yMin) * 0.05;
    yMin -= yPad; yMax += yPad;

    const style = getComputedStyle(document.documentElement);
    const gridColor = style.getPropertyValue('--chart-grid').trim();
    const gridStrong = style.getPropertyValue('--chart-grid-strong').trim();
    const textDim = style.getPropertyValue('--text-dim').trim();

    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (let i = 0; i <= 5; i++) {
        const y = pad.top + (plotH / 5) * i;
        const val = yMax - ((yMax - yMin) / 5) * i;
        ctx.strokeStyle = i === 0 || i === 5 ? gridStrong : gridColor;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
        ctx.fillStyle = textDim;
        ctx.fillText(formatNum(val), pad.left - 6, y);
    }

    const startIdx = Math.floor(viewStart * allRecords.length);
    const endIdx = Math.floor(viewEnd * allRecords.length);
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (let i = 0; i <= 6; i++) {
        const x = pad.left + (plotW / 6) * i;
        const sample = startIdx + Math.round(((endIdx - startIdx) / 6) * i);
        ctx.fillStyle = textDim;
        ctx.fillText(sample.toString(), x, h - pad.bottom + 6);
    }

    for (const ds of datasets) {
        ctx.strokeStyle = ds.color;
        ctx.lineWidth = 1.2;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let i = 0; i < ds.data.length; i++) {
            const x = pad.left + (i / (maxLen - 1)) * plotW;
            const y = pad.top + (1 - (ds.data[i] - yMin) / (yMax - yMin)) * plotH;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    chartMeta.set(canvas, { datasets, pad, plotW, plotH, yMin, yMax, maxLen, w: rect.width, h: rect.height });
}

function drawMinimap() {
    const canvas = document.getElementById('minimapCanvas');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = rect.width, h = rect.height;

    const accelZ = getCol(allRecords, 'AccelZ');
    if (!accelZ.length) return;
    let yMin = Math.min(...accelZ), yMax = Math.max(...accelZ);
    if (yMin === yMax) { yMin -= 1; yMax += 1; }

    const style = getComputedStyle(document.documentElement);
    ctx.strokeStyle = style.getPropertyValue('--text-dim').trim();
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    for (let i = 0; i < accelZ.length; i++) {
        const x = (i / (accelZ.length - 1)) * w;
        const y = (1 - (accelZ[i] - yMin) / (yMax - yMin)) * h;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
}

function formatNum(v) {
    if (Math.abs(v) >= 1000) return v.toFixed(0);
    if (Math.abs(v) >= 1) return v.toFixed(2);
    return v.toFixed(4);
}

function getVisibleRecords() {
    const start = Math.floor(viewStart * allRecords.length);
    const end = Math.floor(viewEnd * allRecords.length);
    return allRecords.slice(start, Math.max(end, start + 2));
}

function updateRangeUI() {
    const track = document.getElementById('rangeTrack');
    const tw = track.getBoundingClientRect().width;
    const sel = document.getElementById('rangeSelected');
    const hl = document.getElementById('handleLeft');
    const hr = document.getElementById('handleRight');

    sel.style.left = (viewStart * 100) + '%';
    sel.style.width = ((viewEnd - viewStart) * 100) + '%';
    hl.style.left = (viewStart * tw - 4) + 'px';
    hr.style.left = (viewEnd * tw - 4) + 'px';

    const startIdx = Math.floor(viewStart * allRecords.length);
    const endIdx = Math.floor(viewEnd * allRecords.length);
    document.getElementById('rangeInfo').textContent = `${startIdx} – ${endIdx} (${endIdx - startIdx} samples)`;
}

function redrawAllCharts() {
    const visible = getVisibleRecords();
    const style = getComputedStyle(document.documentElement);
    const red = style.getPropertyValue('--red').trim();
    const green = style.getPropertyValue('--green').trim();
    const blue = style.getPropertyValue('--blue').trim();
    const accent = style.getPropertyValue('--accent').trim();
    const purple = style.getPropertyValue('--purple').trim();
    const cyan = style.getPropertyValue('--cyan').trim();

    const chartDefs = [
        { key: 'accel', datasets: [
            { data: getCol(visible, 'AccelX'), color: red },
            { data: getCol(visible, 'AccelY'), color: green },
            { data: getCol(visible, 'AccelZ'), color: blue },
        ]},
        { key: 'gyro', datasets: [
            { data: getCol(visible, 'GyroX'), color: red },
            { data: getCol(visible, 'GyroY'), color: green },
            { data: getCol(visible, 'GyroZ'), color: blue },
        ]},
        { key: 'mag', datasets: [
            { data: getCol(visible, 'MagX'), color: red },
            { data: getCol(visible, 'MagY'), color: green },
            { data: getCol(visible, 'MagZ'), color: blue },
        ]},
        { key: 'pressure', datasets: [{ data: getCol(visible, 'PressurePa'), color: accent }] },
        { key: 'temp', datasets: [{ data: getCol(visible, 'TemperatureC'), color: cyan }] },
        { key: 'alt', datasets: [{ data: getCol(visible, 'Altitude'), color: purple }] },
        { key: 'vel', datasets: [{ data: getCol(visible, 'VelocityZ'), color: green }] },
    ];

    if (visible[0] && visible[0].State !== undefined) {
        chartDefs.push({ key: 'state', datasets: [{ data: getCol(visible, 'State'), color: accent }] });
    }

    for (const def of chartDefs) {
        const canvas = document.querySelector(`canvas[data-key="${def.key}"]`);
        if (canvas) drawChart(canvas, def.datasets);
    }
}

function renderCharts() {
    const chartsDiv = document.getElementById('charts');
    chartsDiv.innerHTML = '';
    chartsDiv.classList.remove('hidden');

    const chartDefs = [
        { key: 'accel', title: 'Accelerometer', legend: [['X','legend-x'],['Y','legend-y'],['Z','legend-z']] },
        { key: 'gyro', title: 'Gyroscope', legend: [['X','legend-x'],['Y','legend-y'],['Z','legend-z']] },
        { key: 'mag', title: 'Magnetometer', legend: [['X','legend-x'],['Y','legend-y'],['Z','legend-z']] },
        { key: 'pressure', title: 'Pressure' },
        { key: 'temp', title: 'Temperature' },
        { key: 'alt', title: 'Altitude' },
        { key: 'vel', title: 'Velocity Z' },
    ];

    if (allRecords[0] && allRecords[0].State !== undefined) {
        chartDefs.push({ key: 'state', title: 'State' });
    }

    for (const def of chartDefs) {
        const container = document.createElement('div');
        container.className = 'chart-container';
        let legendHTML = '';
        if (def.legend) {
            legendHTML = '<div class="legend">' +
                def.legend.map(([l, cls]) => `<span class="${cls}">${l}</span>`).join('') + '</div>';
        }
        container.innerHTML = `<div class="chart-title">${def.title}${legendHTML}</div>`;
        const canvas = document.createElement('canvas');
        canvas.dataset.key = def.key;
        container.appendChild(canvas);

        const tooltip = document.createElement('div');
        tooltip.className = 'chart-tooltip';
        tooltip.style.opacity = '0';
        container.appendChild(tooltip);

        canvas.addEventListener('mousemove', (e) => {
            const meta = chartMeta.get(canvas);
            if (!meta) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            if (mx < meta.pad.left || mx > meta.w - meta.pad.right) { tooltip.style.opacity = '0'; return; }
            const frac = (mx - meta.pad.left) / meta.plotW;
            const idx = Math.round(frac * (meta.maxLen - 1));
            if (idx < 0 || idx >= meta.maxLen) { tooltip.style.opacity = '0'; return; }

            const startIdx = Math.floor(viewStart * allRecords.length);
            let rows = '<div class="tt-sample">#' + (startIdx + idx) + '</div>';
            const labels = meta.datasets.length === 3 ? ['X', 'Y', 'Z'] : null;
            for (let d = 0; d < meta.datasets.length; d++) {
                const ds = meta.datasets[d];
                const val = ds.data[idx];
                if (val === undefined) continue;
                const label = labels ? labels[d] : '';
                rows += `<div class="tt-row"><span class="tt-dot" style="background:${ds.color}"></span>${label ? label + ': ' : ''}${formatNum(val)}</div>`;
            }
            tooltip.innerHTML = rows;
            tooltip.style.opacity = '1';

            let tx = mx + 12;
            let ty = my - 10;
            const tw = tooltip.offsetWidth;
            const th = tooltip.offsetHeight;
            if (tx + tw > rect.width - 4) tx = mx - tw - 12;
            if (ty + th > rect.height - 4) ty = rect.height - th - 4;
            if (ty < 0) ty = 4;
            tooltip.style.left = tx + 'px';
            tooltip.style.top = ty + 'px';

            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            drawChart(canvas, meta.datasets);
            ctx.save();
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            const cx = meta.pad.left + (idx / (meta.maxLen - 1)) * meta.plotW;
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-dim').trim();
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.beginPath(); ctx.moveTo(cx, meta.pad.top); ctx.lineTo(cx, meta.pad.top + meta.plotH); ctx.stroke();
            ctx.setLineDash([]);
            for (const ds of meta.datasets) {
                const val = ds.data[idx];
                if (val === undefined) continue;
                const cy = meta.pad.top + (1 - (val - meta.yMin) / (meta.yMax - meta.yMin)) * meta.plotH;
                ctx.fillStyle = ds.color;
                ctx.beginPath(); ctx.arc(cx, cy, 3.5, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        });

        canvas.addEventListener('mouseleave', () => {
            tooltip.style.opacity = '0';
            const meta = chartMeta.get(canvas);
            if (meta) drawChart(canvas, meta.datasets);
        });

        chartsDiv.appendChild(container);
    }

    requestAnimationFrame(redrawAllCharts);
}

function renderStats(records, skipped) {
    const statsDiv = document.getElementById('stats');
    statsDiv.classList.remove('hidden');
    const n = records.length;
    const pressure = getCol(records, 'PressurePa');
    const temp = getCol(records, 'TemperatureC');
    const alt = getCol(records, 'Altitude');
    const pMin = Math.min(...pressure).toFixed(1);
    const pMax = Math.max(...pressure).toFixed(1);
    const tAvg = (temp.reduce((a, b) => a + b, 0) / n).toFixed(1);
    const altRange = (Math.max(...alt) - Math.min(...alt)).toFixed(3);
    const states = records[0] && records[0].State !== undefined
        ? [...new Set(getCol(records, 'State'))].sort((a,b) => a-b).join(', ') : '—';

    statsDiv.innerHTML = `
        <div class="stat-card"><div class="label">Records</div><div class="value">${n}</div></div>
        <div class="stat-card"><div class="label">Skipped bytes</div><div class="value">${skipped}</div></div>
        <div class="stat-card"><div class="label">Pressure range</div><div class="value">${pMin}–${pMax}</div></div>
        <div class="stat-card"><div class="label">Avg temp</div><div class="value">${tAvg} °C</div></div>
        <div class="stat-card"><div class="label">Alt range</div><div class="value">${altRange} m</div></div>
        <div class="stat-card"><div class="label">States</div><div class="value">${states}</div></div>
    `;
}

function initRangeControl() {
    const ctrl = document.getElementById('rangeControl');
    ctrl.classList.remove('hidden');

    const track = document.getElementById('rangeTrack');
    const hl = document.getElementById('handleLeft');
    const hr = document.getElementById('handleRight');
    const sel = document.getElementById('rangeSelected');

    let dragging = null; // 'left', 'right', 'middle'
    let dragStartX = 0, dragStartLeft = 0, dragStartRight = 0;

    function getPos(e) {
        const rect = track.getBoundingClientRect();
        return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    }

    hl.addEventListener('mousedown', (e) => {
        e.preventDefault(); dragging = 'left'; hl.classList.add('active');
    });
    hr.addEventListener('mousedown', (e) => {
        e.preventDefault(); dragging = 'right'; hr.classList.add('active');
    });
    sel.addEventListener('mousedown', (e) => {
        e.preventDefault(); dragging = 'middle';
        dragStartX = e.clientX; dragStartLeft = viewStart; dragStartRight = viewEnd;
    });
    track.addEventListener('mousedown', (e) => {
        if (e.target === track || e.target.tagName === 'CANVAS') {
            const pos = getPos(e);
            const mid = (viewStart + viewEnd) / 2;
            const halfSpan = (viewEnd - viewStart) / 2;
            viewStart = Math.max(0, pos - halfSpan);
            viewEnd = Math.min(1, pos + halfSpan);
            if (viewStart < 0) { viewEnd -= viewStart; viewStart = 0; }
            if (viewEnd > 1) { viewStart -= (viewEnd - 1); viewEnd = 1; }
            updateRangeUI(); redrawAllCharts();
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const pos = getPos(e);
        if (dragging === 'left') {
            viewStart = Math.min(pos, viewEnd - 0.01);
        } else if (dragging === 'right') {
            viewEnd = Math.max(pos, viewStart + 0.01);
        } else if (dragging === 'middle') {
            const rect = track.getBoundingClientRect();
            const dx = (e.clientX - dragStartX) / rect.width;
            const span = dragStartRight - dragStartLeft;
            let newStart = dragStartLeft + dx;
            let newEnd = dragStartRight + dx;
            if (newStart < 0) { newStart = 0; newEnd = span; }
            if (newEnd > 1) { newEnd = 1; newStart = 1 - span; }
            viewStart = newStart; viewEnd = newEnd;
        }
        updateRangeUI(); redrawAllCharts();
    });

    document.addEventListener('mouseup', () => {
        dragging = null;
        hl.classList.remove('active'); hr.classList.remove('active');
    });

    drawMinimap();
    updateRangeUI();
}

function processFile(file) {
    document.getElementById('fileInfo').textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
    const reader = new FileReader();
    reader.onload = function(e) {
        const { records, skipped } = decode(e.target.result);
        if (!records.length) { alert('No valid records. Check format.'); return; }
        allRecords = records;
        viewStart = 0; viewEnd = 1;
        document.getElementById('dropZone').classList.add('hidden');
        renderStats(records, skipped);
        renderCharts();
        initRangeControl();
    };
    reader.readAsArrayBuffer(file);
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => { if (e.target.files.length) processFile(e.target.files[0]); });

window.addEventListener('resize', () => {
    if (allRecords.length) { redrawAllCharts(); drawMinimap(); updateRangeUI(); }
});
</script>
